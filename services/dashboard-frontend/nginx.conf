# Serves the built SPA and proxies /api/* to dashboard-api — same-origin, so
# no CORS configuration is needed anywhere.
server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  location /api/ {
    proxy_pass http://dashboard-api:4000/;
  }

  location / {
    try_files $uri /index.html;
  }
}
