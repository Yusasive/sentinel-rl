# Load balancer for the rate-limiter cluster.
#
# least_conn + keepalive upstream connections keep added latency in the
# sub-millisecond range so the "few ms" decision SLA budget stays with Redis,
# not the proxy hop.

worker_processes auto;

events {
  worker_connections 4096;
}

http {
  upstream ratelimiter {
    least_conn;
    server ratelimiter-1:3000 max_fails=2 fail_timeout=3s;
    server ratelimiter-2:3000 max_fails=2 fail_timeout=3s;
    server ratelimiter-3:3000 max_fails=2 fail_timeout=3s;
    keepalive 64; # reuse upstream TCP connections; avoids handshake per check
  }

  server {
    listen 80;

    # access log off on the hot path: logging every /check to disk would
    # add I/O jitter to exactly the path that must stay in the low-ms range.
    access_log off;

    location / {
      proxy_pass http://ratelimiter;
      proxy_http_version 1.1;
      proxy_set_header Connection ""; # required for upstream keepalive
      proxy_connect_timeout 1s;
      proxy_read_timeout 5s;
      # If one instance is down (chaos tests), retry the next one instead of
      # surfacing an error to the calling microservice.
      proxy_next_upstream error timeout http_502 http_503;
    }
  }
}
