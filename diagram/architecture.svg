<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="1000" viewBox="0 0 1480 1000" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#52514e"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2a78d6"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#008300"/>
    </marker>
    <marker id="arrowOrange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#eb6834"/>
    </marker>
  </defs>

  <rect width="1480" height="1000" fill="#fcfcfb"/>
  <text x="620" y="42" text-anchor="middle" font-size="25" font-weight="bold" fill="#0b0b0b">Global Rate Limiter as a Service — Architecture</text>
  <text x="620" y="68" text-anchor="middle" font-size="13.5" fill="#52514e">Hot path (blue) = one atomic Redis Lua round trip · async log pipeline (green) feeds analytics · dashed orange = degraded-mode fallback</text>

  <!-- Callers -->
  <rect x="440" y="92" width="360" height="66" rx="10" fill="#eef4fc" stroke="#2a78d6" stroke-width="2"/>
  <text x="620" y="120" text-anchor="middle" font-size="16" font-weight="bold" fill="#0b0b0b">Internal Microservices</text>
  <text x="620" y="142" text-anchor="middle" font-size="12" fill="#52514e">N instances — call POST /check before each 3rd-party request</text>

  <!-- LB -->
  <rect x="470" y="200" width="300" height="56" rx="10" fill="#ffffff" stroke="#52514e" stroke-width="2"/>
  <text x="620" y="224" text-anchor="middle" font-size="15" font-weight="bold" fill="#0b0b0b">Nginx Load Balancer :8080</text>
  <text x="620" y="243" text-anchor="middle" font-size="12" fill="#52514e">least_conn · keepalive · retry next upstream</text>
  <line x1="620" y1="158" x2="620" y2="196" stroke="#2a78d6" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="632" y="182" font-size="12" fill="#2a78d6">POST /check · POST /report</text>

  <!-- Rate limiter instances -->
  <rect x="180" y="312" width="250" height="118" rx="10" fill="#ffffff" stroke="#2a78d6" stroke-width="2"/>
  <rect x="495" y="312" width="250" height="118" rx="10" fill="#ffffff" stroke="#2a78d6" stroke-width="2"/>
  <rect x="810" y="312" width="250" height="118" rx="10" fill="#ffffff" stroke="#2a78d6" stroke-width="2"/>
  <text x="305" y="338" text-anchor="middle" font-size="15" font-weight="bold" fill="#0b0b0b">Rate Limiter rl-1</text>
  <text x="620" y="338" text-anchor="middle" font-size="15" font-weight="bold" fill="#0b0b0b">Rate Limiter rl-2</text>
  <text x="935" y="338" text-anchor="middle" font-size="15" font-weight="bold" fill="#0b0b0b">Rate Limiter rl-3</text>
  <g font-size="11.5" fill="#52514e">
    <text x="305" y="360" text-anchor="middle">stateless · Fastify/TypeScript</text>
    <text x="305" y="378" text-anchor="middle">circuit breaker (50ms budget)</text>
    <text x="305" y="396" text-anchor="middle">local token bucket (bounded)</text>
    <text x="305" y="414" text-anchor="middle">in-mem config snapshot</text>
    <text x="620" y="360" text-anchor="middle">stateless · Fastify/TypeScript</text>
    <text x="620" y="378" text-anchor="middle">circuit breaker (50ms budget)</text>
    <text x="620" y="396" text-anchor="middle">local token bucket (bounded)</text>
    <text x="620" y="414" text-anchor="middle">in-mem config snapshot</text>
    <text x="935" y="360" text-anchor="middle">stateless · Fastify/TypeScript</text>
    <text x="935" y="378" text-anchor="middle">circuit breaker (50ms budget)</text>
    <text x="935" y="396" text-anchor="middle">local token bucket (bounded)</text>
    <text x="935" y="414" text-anchor="middle">in-mem config snapshot</text>
  </g>
  <line x1="540" y1="256" x2="330" y2="308" stroke="#2a78d6" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <line x1="620" y1="256" x2="620" y2="308" stroke="#2a78d6" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <line x1="700" y1="256" x2="910" y2="308" stroke="#2a78d6" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- Fallback dashed annotation -->
  <path d="M 180 370 C 105 370 105 448 180 448" fill="none" stroke="#eb6834" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowOrange)"/>
  <text x="30" y="480" font-size="12" fill="#eb6834">Redis down → breaker opens:</text>
  <text x="30" y="497" font-size="12" fill="#eb6834">fail-open → bounded local bucket</text>
  <text x="30" y="514" font-size="12" fill="#eb6834">fail-closed → deny (per-client policy)</text>

  <!-- Redis -->
  <rect x="360" y="500" width="520" height="116" rx="10" fill="#fdf1ee" stroke="#d03b3b" stroke-width="2"/>
  <text x="620" y="528" text-anchor="middle" font-size="16" font-weight="bold" fill="#0b0b0b">Redis 7 (AOF everysec) — hot-path source of truth</text>
  <g font-size="12" fill="#52514e">
    <text x="620" y="551" text-anchor="middle">atomic Lua: config read + TIME-based sliding window + INCR in ONE round trip</text>
    <text x="620" y="570" text-anchor="middle">keys: ratelimit:{clientId}:{window} — hash-tagged per client (Cluster-ready)</text>
    <text x="620" y="589" text-anchor="middle">request-log-stream + report-stream (async, MAXLEN ~1M)</text>
  </g>
  <line x1="305" y1="430" x2="580" y2="496" stroke="#2a78d6" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <line x1="620" y1="430" x2="620" y2="496" stroke="#2a78d6" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <line x1="935" y1="430" x2="660" y2="496" stroke="#2a78d6" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <text x="700" y="468" font-size="12" fill="#2a78d6">EVALSHA (one atomic op)</text>

  <!-- Log worker -->
  <rect x="360" y="680" width="520" height="78" rx="10" fill="#eef7ee" stroke="#008300" stroke-width="2"/>
  <text x="620" y="706" text-anchor="middle" font-size="15" font-weight="bold" fill="#0b0b0b">Log Worker — consumer group "logworkers"</text>
  <text x="620" y="727" text-anchor="middle" font-size="12" fill="#52514e">batch 500 · XACK after commit · PEL replay on crash · at-least-once</text>
  <text x="620" y="745" text-anchor="middle" font-size="12" fill="#52514e">idempotent sink: ON CONFLICT (stream_id) DO NOTHING</text>
  <line x1="620" y1="616" x2="620" y2="676" stroke="#008300" stroke-width="2.5" marker-end="url(#arrowGreen)"/>
  <text x="632" y="652" font-size="12" fill="#008300">XREADGROUP (async)</text>

  <!-- Postgres -->
  <rect x="360" y="800" width="520" height="74" rx="10" fill="#eef7ee" stroke="#008300" stroke-width="2"/>
  <text x="620" y="827" text-anchor="middle" font-size="15" font-weight="bold" fill="#0b0b0b">PostgreSQL 15 + TimescaleDB</text>
  <text x="620" y="849" text-anchor="middle" font-size="12" fill="#52514e">request_logs hypertable (PK stream_id + requested_at) · client_configs · time_bucket() analytics</text>
  <line x1="620" y1="758" x2="620" y2="796" stroke="#008300" stroke-width="2.5" marker-end="url(#arrowGreen)"/>

  <!-- Dashboard API -->
  <rect x="1120" y="560" width="310" height="96" rx="10" fill="#ffffff" stroke="#52514e" stroke-width="2"/>
  <text x="1275" y="588" text-anchor="middle" font-size="15" font-weight="bold" fill="#0b0b0b">Dashboard API :4000</text>
  <text x="1275" y="610" text-anchor="middle" font-size="12" fill="#52514e">usage / trend / filter · config CRUD</text>
  <text x="1275" y="628" text-anchor="middle" font-size="12" fill="#52514e">X-API-Key tenancy (client-scoped)</text>
  <text x="1275" y="646" text-anchor="middle" font-size="12" fill="#52514e">boot + write: Postgres → Redis config sync</text>

  <!-- Dashboard SPA -->
  <rect x="1120" y="800" width="310" height="74" rx="10" fill="#ffffff" stroke="#52514e" stroke-width="2"/>
  <text x="1275" y="827" text-anchor="middle" font-size="15" font-weight="bold" fill="#0b0b0b">Dashboard SPA :3000</text>
  <text x="1275" y="849" text-anchor="middle" font-size="12" fill="#52514e">React + Recharts · real-time + 10/15/30d trends</text>

  <!-- Dashboard arrows -->
  <line x1="1275" y1="796" x2="1275" y2="660" stroke="#52514e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1287" y="735" font-size="11" fill="#52514e">/api (same-origin proxy)</text>
  <line x1="1120" y1="640" x2="884" y2="822" stroke="#52514e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="1010" y="748" font-size="11" fill="#52514e">SQL: time_bucket trends</text>
  <line x1="1120" y1="590" x2="884" y2="566" stroke="#52514e" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="948" y="555" font-size="11" fill="#52514e">live counters + config sync</text>

  <!-- Config admin -->
  <rect x="1120" y="92" width="310" height="92" rx="10" fill="#fffaf0" stroke="#eda100" stroke-width="2"/>
  <text x="1275" y="120" text-anchor="middle" font-size="14" font-weight="bold" fill="#0b0b0b">Platform engineers — config admin</text>
  <text x="1275" y="142" text-anchor="middle" font-size="12" fill="#52514e">PUT /config/:clientId (admin API key)</text>
  <text x="1275" y="160" text-anchor="middle" font-size="12" fill="#52514e">Postgres upsert → Redis hash</text>
  <text x="1275" y="178" text-anchor="middle" font-size="12" fill="#52514e">live within seconds, no redeploy</text>
  <line x1="1275" y1="184" x2="1275" y2="556" stroke="#eda100" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="620" y="960" text-anchor="middle" font-size="13" fill="#898781">docker compose up --build brings up everything · race test: 150 concurrent requests vs limit 100 across 3 instances ⇒ exactly 100 allowed</text>
</svg>
